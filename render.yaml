services:
  - type: web
    name: nrc-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nrc-postgres
          property: connectionString
      - key: PORT
        value: 10000
      - key: GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: nrc-postgres
    databaseName: nrc_quiz_db
    user: nrc_user
    plan: free
    region: singapore

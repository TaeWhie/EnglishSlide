services:
  - type: web
    name: nrc-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
